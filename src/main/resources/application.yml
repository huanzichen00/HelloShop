server:
  port: 8081

project:
  name: springboot-hello
  version: 0.0.1
  author: huanzichen

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/springboot_study_flyway?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  flyway:
    enabled: true
    locations: classpath:db
    baseline-on-migrate: false
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

mybatis:
  mapper-locations: classpath:mapper/*.xml

